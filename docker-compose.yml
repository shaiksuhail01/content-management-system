services:
  backend:
    build:
      context: ./backend
    container_name: renewcred-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"

  admin-frontend:
    build:
      context: ./admin-frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000/api/v1
    container_name: renewcred-admin
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  public-frontend:
    build:
      context: ./public-frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api/v1
    container_name: renewcred-public
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://backend:5000/api/v1
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend